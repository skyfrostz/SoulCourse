name: subject-choice-forum

services:
  postgres:
    image: postgres:17-alpine
    container_name: scf-postgres
    environment:
      POSTGRES_USER: forum
      POSTGRES_PASSWORD: forum_dev_password
      POSTGRES_DB: forum
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forum -d forum"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8-alpine
    container_name: scf-redis
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    image: subject-choice-forum-backend:dev
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: scf-backend
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_ADDR: redis:6379
    ports:
      - "${HTTP_HOST_PORT:-8081}:8080"
    volumes:
      - ./backend:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: subject-choice-forum-frontend:dev
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: scf-frontend
    working_dir: /app
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
      VITE_DEV_PROXY_TARGET: http://backend:8080
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
      - frontend-pnpm-store:/pnpm/store
    command: pnpm dev --host 0.0.0.0
    depends_on:
      - backend

  admin:
    image: python:3.13-alpine
    container_name: scf-admin
    working_dir: /app
    ports:
      - "${ADMIN_HOST_PORT:-5175}:5175"
    volumes:
      - ./admin:/app:ro
    command: python3 -m http.server 5175 --bind 0.0.0.0
    depends_on:
      - backend

volumes:
  postgres-data:
  redis-data:
  go-mod-cache:
  go-build-cache:
  frontend-node-modules:
  frontend-pnpm-store:
